name: teamspace integration

on:
  push:
    branches: ["main"]
  release:
    types:
      - created
  pull_request:
    types: [ opened, reopened, ready_for_review, synchronize ]  # added `ready_for_review` since draft is skipped

jobs:
  cpu:
    runs-on: ${{ matrix.os }}
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        auth_mode: ["user", "guest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        requires: ["latest"]
        include:
          - python-version: "3.10"
            requires: "oldest"
            os: "ubuntu-latest"
            auth_mode: "guest"
          - python-version: "3.10"
            requires: "oldest"
            os: "ubuntu-latest"
            auth_mode: "user"

    timeout-minutes: 20
    env:
      LIGHTNING_CLOUD_URL: https://staging.gridai.dev
      UV_TORCH_BACKEND: cpu

    steps:
    - uses: actions/checkout@v5
    - name: Install uv and setup python
      uses: astral-sh/setup-uv@v6
      with:
        activate-environment: true
        python-version: ${{ matrix.python-version }}
        enable-cache: true

    - name: Set min. dependencies
      if: matrix.requires == 'oldest'
      run: |
        uv pip install 'lightning-utilities[cli]>=0.15.1'
        uv run python -m lightning_utilities.cli requirements set-oldest --req_files=pyproject.toml

    - name: Install dependencies
      run: |
        uv sync --group tests
        uv pip list

    - name: Enable Guest Mode
      if: matrix.auth_mode == 'guest'
      shell: bash
      run: echo "TEST_GUEST_MODE=1" >> $GITHUB_ENV

    - name: Set Auth Credentials
      if: matrix.auth_mode == 'user'
      shell: bash
      run: |
        echo "LIGHTNING_USER_ID=${{ secrets.LIGHTNING_STAGING_USER_ID }}" >> $GITHUB_ENV
        echo "LIGHTNING_API_KEY=${{ secrets.LIGHTNING_STAGING_API_KEY }}" >> $GITHUB_ENV

    - name: Tests
      working-directory: tests/
      run: |
        uv run pytest integrations/ -vvs --ignore=integrations/test_lightning_logger.py --ignore=integrations/test_pytorch_litlogger.py

  lightning-loggers:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        lightning-source: ["github"] # ["pypi", "github"] # Add once new lightning release was done

    timeout-minutes: 30
    env:
      LIGHTNING_CLOUD_URL: https://staging.gridai.dev
      UV_TORCH_BACKEND: cpu

    steps:
    - uses: actions/checkout@v5
    - name: Install uv and setup python
      uses: astral-sh/setup-uv@v6
      with:
        activate-environment: true
        python-version: "3.12"
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --group tests
        uv pip list

    - name: Install lightning from PyPI
      if: matrix.lightning-source == 'pypi'
      run: uv pip install --upgrade lightning

    - name: Install lightning from GitHub
      if: matrix.lightning-source == 'github'
      run: uv pip install --upgrade 'lightning @ git+https://github.com/Lightning-AI/pytorch-lightning.git@update_litlogger_internals'

    - name: Show lightning source
      run: |
        uv run python - <<'PY'
        import inspect
        import lightning
        from lightning.pytorch.loggers import LitLogger

        print(lightning.__version__)
        print(inspect.getsourcefile(LitLogger))
        PY

    - name: Set Auth Credentials
      shell: bash
      run: |
        echo "LIGHTNING_USER_ID=${{ secrets.LIGHTNING_STAGING_USER_ID }}" >> $GITHUB_ENV
        echo "LIGHTNING_API_KEY=${{ secrets.LIGHTNING_STAGING_API_KEY }}" >> $GITHUB_ENV

    - name: Lightning Adapter Tests
      run: |
        uv run pytest tests/integrations/test_lightning_logger.py tests/integrations/test_pytorch_litlogger.py -vvs

  guardian-integration-tests:
    runs-on: ubuntu-latest
    needs: [cpu, lightning-loggers]
    if: always()
    steps:
    - run: echo "${{ needs.cpu.result }} / ${{ needs.lightning-loggers.result }}"
    - name: failing...
      if: needs.cpu.result == 'failure' || needs.lightning-loggers.result == 'failure'
      run: exit 1
    - name: cancelled or skipped...
      if: contains(fromJSON('["cancelled", "skipped"]'), needs.cpu.result) || contains(fromJSON('["cancelled", "skipped"]'), needs.lightning-loggers.result)
      timeout-minutes: 1
      run: sleep 90
